# Generated with zope.meta (https://zopemeta.readthedocs.io/) from:
# https://github.com/zopefoundation/meta/tree/master/src/zope/meta/pure-python
[meta]
template = "pure-python"
commit-id = "6a771177"

[python]
with-sphinx-doctests = false
with-docs = true
with-future-python = false
with-pypy = true
with-macos = false
with-windows = false
with-free-threaded-python = false

[tox]
testenv-commands = [
    "pytest []"
]
testenv-deps = [
    "pytest",
    "pytest-cov",
    "pytest-remove-stale-bytecode",
]
coverage-setenv = [
    "COVERAGE_FILE = {toxinidir}/.coverage",
]
coverage-command = [
    "coverage erase",
    "pytest --cov=src --cov-report= -vs []",
    ]

[coverage]
fail-under = 98

[coverage-run]
additional-config = [
    "parallel = true",
    ]

[flake8]
additional-config = [
    "# E501 line too long",
    "per-file-ignores =",
    "    src/zope/pytestlayer/tests/test_integration.py: E501",
    ]

[manifest]
additional-rules = [
    "include *.py",
    "include *.yaml",
    "include pytest.ini",
    "recursive-include src *.txt",
    ]

[pypi]
trusted-publishing = true
